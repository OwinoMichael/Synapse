spring:
  application:
    name: synapse-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/synapse
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none        # validate in prod — schema.sql owns DDL
    show-sql: false
    properties:
#      hibernate: {}

  sql:
    init:
      mode: always              # always run schema.sql on startup
      schema-locations: classpath:db/schema.sql

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # MarketTickEvent serialised as JSON
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: synapse-signals
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.synapse.ai.features.marketdata.clob.events"

# ── Polymarket ───────────────────────────────────────────────────────
polymarket:
  gamma:
    base-url: https://gamma-api.polymarket.com
    # How often to re-sync market metadata (ms). Default: 10 minutes.
    sync-interval-ms: 600000

  trades:
    base-url: https://data-api.polymarket.com
    poll-interval-ms: 30000   # 30 seconds
    whale-threshold: 10000    # USDC — trades above this are flagged as whale
    lookback-seconds: 300     # on startup look back 5 min
    page-size: 100

  clob:
    # Fallback asset IDs used on first startup before Gamma syncs.
    # After the first Gamma sync these are replaced by DB values.
    asset-ids:
      - "71321045679252212594626385532706912750332728571942532289631379312455583992563"
      - "52114319501245915516055106046884209969926127482827954674443846427813813222426"